name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install tools
        run: pip install pip-audit bandit

      - name: pip-audit — check dependencies for CVEs
        run: pip-audit -r requirements.txt --progress-spinner off

      - name: bandit — scan code for security issues
        run: bandit -r agents/ tools/ common/ mcp_client/ -ll -q
