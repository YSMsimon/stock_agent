<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #ffffff;
      --sidebar:    #f9f9f9;
      --border:     #e8e8e8;
      --surface:    #f2f2f2;
      --hover:      #efefef;
      --text:       #111111;
      --muted:      #999999;
      --accent:     #5b52f0;
      --accent-lt:  rgba(91,82,240,0.09);
      --green:      #16a34a;
      --red:        #dc2626;
      --radius:     10px;
      --shadow-sm:  0 1px 2px rgba(0,0,0,0.05);
      --shadow:     0 2px 8px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 252px;
      min-width: 252px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-head {
      padding: 14px 12px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 2px 4px 12px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #5b52f0 0%, #8b5cf6 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
    }

    .new-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.12s, box-shadow 0.12s;
      box-shadow: var(--shadow-sm);
    }

    .new-btn:hover { background: var(--hover); box-shadow: var(--shadow); }
    .new-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px 12px;
    }

    .conv-list::-webkit-scrollbar { width: 3px; }
    .conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .conv-section-label {
      padding: 10px 8px 4px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    .conv-sep { height: 1px; background: var(--border); margin: 6px 4px; }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 9px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }

    .conv-item:hover { background: var(--hover); }

    .conv-item.active {
      background: var(--bg);
      box-shadow: var(--shadow-sm);
    }

    .conv-pin-dot {
      color: var(--accent);
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .conv-name {
      flex: 1;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .conv-item.active .conv-name { font-weight: 500; }

    .conv-actions {
      display: none;
      gap: 1px;
      flex-shrink: 0;
    }

    .conv-item:hover .conv-actions { display: flex; }

    .icon-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }

    .icon-btn:hover { background: var(--surface); color: var(--text); }
    .icon-btn.active-pin { color: var(--accent); }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 50px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
      flex-shrink: 0;
    }

    .topbar-name {
      flex: 1;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      background: var(--surface);
      border-radius: 20px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      flex-shrink: 0;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .status-dot.off { background: #d1d5db; }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 4px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row {
      padding: 8px 44px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      animation: fadeUp 0.18s ease;
    }

    /* User bubble */
    .msg-user-wrap {
      display: flex;
      justify-content: flex-end;
    }

    .msg-user-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px 14px 3px 14px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 78%;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-time {
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 4px;
      text-align: right;
    }

    /* AI message */
    .msg-ai-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .ai-avatar {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(135deg, #5b52f0 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
      font-size: 12px;
    }

    .ai-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .ai-time {
      font-size: 10.5px;
      color: var(--muted);
      margin-left: auto;
    }

    .msg-body {
      padding-left: 32px;
    }

    /* Markdown content */
    .md-content { font-size: 14px; line-height: 1.75; color: var(--text); }
    .md-content p { margin-bottom: 10px; }
    .md-content p:last-child { margin-bottom: 0; }
    .md-content ul, .md-content ol { padding-left: 20px; margin-bottom: 10px; }
    .md-content li { margin-bottom: 3px; }
    .md-content h1 { font-size: 18px; font-weight: 600; margin: 18px 0 8px; }
    .md-content h2 { font-size: 16px; font-weight: 600; margin: 14px 0 6px; }
    .md-content h3 { font-size: 14px; font-weight: 600; margin: 12px 0 4px; }
    .md-content strong { font-weight: 600; }
    .md-content a { color: var(--accent); text-decoration: none; }
    .md-content a:hover { text-decoration: underline; }
    .md-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin: 8px 0; }

    .md-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 12px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .md-content th {
      background: var(--surface);
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .md-content td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .md-content tr:last-child td { border-bottom: none; }
    .md-content tr:nth-child(even) td { background: rgba(0,0,0,0.015); }

    .md-content code:not(pre code) {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'SF Mono','Fira Code',monospace;
    }

    .code-block {
      position: relative;
      margin: 12px 0;
    }

    .code-block pre {
      background: #f8f9fa;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow-x: auto;
      margin: 0;
    }

    .code-block pre code {
      padding: 14px 16px;
      display: block;
      font-size: 12px;
      font-family: 'SF Mono','Fira Code',monospace;
      line-height: 1.6;
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 3px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .copy-btn:hover { color: var(--text); border-color: #bbb; }
    .copy-btn.copied { color: var(--green); border-color: var(--green); }

    /* ── TOOL PROGRESS ── */
    .tool-progress-wrap {
      padding: 0 0 10px 32px;
    }

    .tool-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 12.5px;
      color: var(--muted);
      animation: fadeUp 0.15s ease;
    }

    .tool-row.running { color: var(--accent); }
    .tool-row.done { opacity: 0.45; }

    .tool-spinner-wrap {
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .t-spinner {
      width: 13px;
      height: 13px;
      border: 1.5px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    .t-check { color: var(--green); }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CURSOR ── */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: var(--text);
      opacity: 0.4;
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 0%,100%{opacity:.4} 50%{opacity:0} }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 55vh;
      gap: 12px;
      padding: 40px 20px;
      animation: fadeUp 0.25s ease;
    }

    .empty-grad {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #5b52f0, #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      margin-bottom: 4px;
      box-shadow: 0 4px 16px rgba(91,82,240,0.25);
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: var(--text);
    }

    .empty-sub {
      font-size: 13.5px;
      color: var(--muted);
      max-width: 380px;
      text-align: center;
      line-height: 1.6;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 6px;
    }

    .chip-btn {
      padding: 8px 15px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      background: var(--bg);
      transition: all 0.14s;
      box-shadow: var(--shadow-sm);
    }

    .chip-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-lt);
    }

    /* ── INPUT ── */
    .input-wrap {
      padding: 10px 44px 18px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      flex-shrink: 0;
    }

    .input-box {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.14s, box-shadow 0.14s;
    }

    .input-box:focus-within {
      border-color: #b8b5f7;
      box-shadow: 0 0 0 3px var(--accent-lt);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      line-height: 1.5;
      max-height: 140px;
      min-height: 22px;
      overflow-y: auto;
    }

    textarea::placeholder { color: #c0c0c0; }

    .send-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.14s, transform 0.1s;
      margin-bottom: 1px;
      color: white;
    }

    .send-btn:hover { opacity: 0.87; }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { opacity: 0.22; cursor: not-allowed; }

    .stop-btn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      background: var(--bg);
      border: 1.5px solid #fca5a5;
      color: var(--red);
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s;
      margin-bottom: 1px;
      flex-shrink: 0;
    }

    .stop-btn:hover { background: #fef2f2; }
    .stop-btn.visible { display: flex; }

    .hint {
      font-size: 11px;
      color: #ccc;
      text-align: center;
      margin-top: 6px;
    }

    /* ── DIALOG ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(3px);
      animation: fadeUp 0.15s ease;
    }

    .dialog {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 24px;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .dialog h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .dialog p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.55; }
    .dialog-btns { display: flex; gap: 8px; justify-content: flex-end; }

    .btn {
      padding: 7px 15px;
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.12s;
    }

    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--hover); }
    .btn-danger { background: #fef2f2; border: 1px solid #fecaca; color: var(--red); }
    .btn-danger:hover { background: #fee2e2; }

    @media (max-width: 580px) {
      .sidebar { display: none; }
      .msg-row { padding: 8px 14px; }
      .input-wrap { padding: 10px 14px 16px; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-head">
    <div class="logo">
      <div class="logo-mark">
        <i data-lucide="trending-up" style="width:15px;height:15px"></i>
      </div>
      Stock Agent
    </div>
    <button class="new-btn" id="newBtn" onclick="newChat()">
      <i data-lucide="plus" style="width:14px;height:14px"></i>
      New conversation
    </button>
  </div>
  <div class="conv-list" id="convList"></div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-name" id="topbarName">Stock Research</div>
    <div class="status-badge">
      <div class="status-dot off" id="statusDot"></div>
      <span id="statusLabel">Connecting</span>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-wrap">
    <div class="input-box">
      <textarea id="input" placeholder="Ask about any stock..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="stop-btn" id="stopBtn" onclick="stopGeneration()">
        <i data-lucide="square" style="width:12px;height:12px"></i> Stop
      </button>
      <button class="send-btn" id="sendBtn" onclick="sendFromInput()" title="Send (Enter)">
        <i data-lucide="send" style="width:15px;height:15px"></i>
      </button>
    </div>
    <div class="hint">Enter to send · Shift+Enter for new line</div>
  </div>
</main>

<div class="overlay" id="dialogOverlay" style="display:none">
  <div class="dialog">
    <h3 id="dlgTitle">Delete conversation?</h3>
    <p id="dlgMsg">This will permanently remove this conversation.</p>
    <div class="dialog-btns">
      <button class="btn btn-ghost" onclick="closeDialog()">Cancel</button>
      <button class="btn btn-danger" id="dlgConfirm">Delete</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════
// STATE
// ══════════════════════════════════
const API = '';
let isStreaming = false;
let abortCtrl   = null;

// Safe wrapper — lucide may not be loaded if CDN is slow
function safeIcons() {
  try { safeIcons(); } catch (_) {}
}

let convs  = JSON.parse(localStorage.getItem('sa_convs')  || '[]');
let active = localStorage.getItem('sa_active') || null;

if (!convs.length) {
  const c = mkConv();
  convs.push(c);
  active = c.id;
}
if (!convs.find(c => c.id === active)) active = convs[0].id;
save();

function mkConv() {
  return { id: uid(), title: 'New conversation', msgs: [], pinned: false, ts: Date.now() };
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function save() {
  localStorage.setItem('sa_convs', JSON.stringify(convs));
  localStorage.setItem('sa_active', active);
}
function current() { return convs.find(c => c.id === active); }

// ══════════════════════════════════
// BOOT
// ══════════════════════════════════
window.addEventListener('load', () => {
  safeIcons();
  ping();
  renderSidebar();
  renderChat();
  document.getElementById('input').focus();
});

async function ping() {
  const dot = document.getElementById('statusDot');
  const lbl = document.getElementById('statusLabel');
  try {
    const r = await fetch(`${API}/api/health`);
    if (r.ok) { dot.classList.remove('off'); lbl.textContent = 'Ready'; }
    else throw 0;
  } catch { dot.classList.add('off'); lbl.textContent = 'Offline'; }
}

// ══════════════════════════════════
// SIDEBAR
// ══════════════════════════════════
function renderSidebar() {
  const list   = document.getElementById('convList');
  const pinned = convs.filter(c => c.pinned).sort((a,b) => b.ts - a.ts);
  const recent = convs.filter(c => !c.pinned).sort((a,b) => b.ts - a.ts);

  list.innerHTML = '';

  if (pinned.length) {
    label(list, 'Pinned');
    pinned.forEach(c => list.appendChild(convEl(c)));
    if (recent.length) { const s = el('div','conv-sep'); list.appendChild(s); }
  }
  if (recent.length) {
    label(list, pinned.length ? 'Recent' : 'Conversations');
    recent.forEach(c => list.appendChild(convEl(c)));
  }

  // Guard new button: disable if current conv is empty
  const cur = current();
  document.getElementById('newBtn').disabled = !!(cur && cur.msgs.length === 0);
}

function label(parent, text) {
  const d = el('div', 'conv-section-label');
  d.textContent = text;
  parent.appendChild(d);
}

function convEl(conv) {
  const d = el('div', 'conv-item' + (conv.id === active ? ' active' : ''));

  if (conv.pinned) {
    const dot = el('span', 'conv-pin-dot');
    dot.innerHTML = `<i data-lucide="pin" style="width:11px;height:11px"></i>`;
    d.appendChild(dot);
  }

  const name = el('span', 'conv-name');
  name.textContent = conv.title;
  d.appendChild(name);

  const acts = el('div', 'conv-actions');

  const pinBtn = el('button', 'icon-btn' + (conv.pinned ? ' active-pin' : ''));
  pinBtn.title = conv.pinned ? 'Unpin' : 'Pin';
  pinBtn.innerHTML = `<i data-lucide="${conv.pinned ? 'pin-off' : 'pin'}" style="width:13px;height:13px"></i>`;
  pinBtn.onclick = e => { e.stopPropagation(); togglePin(conv.id); };

  const delBtn = el('button', 'icon-btn');
  delBtn.title = 'Delete';
  delBtn.innerHTML = `<i data-lucide="trash-2" style="width:13px;height:13px"></i>`;
  delBtn.onclick = e => { e.stopPropagation(); askDelete(conv.id); };

  acts.appendChild(pinBtn);
  acts.appendChild(delBtn);
  d.appendChild(acts);

  d.addEventListener('click', () => switchConv(conv.id));
  return d;
}

function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

// ══════════════════════════════════
// CONVERSATION ACTIONS
// ══════════════════════════════════
async function newChat() {
  const cur = current();
  if (cur && cur.msgs.length === 0) {
    document.getElementById('input').focus();
    return;
  }
  if (isStreaming) return;
  const c = mkConv();
  convs.unshift(c);
  active = c.id;
  save();
  await fetch(`${API}/api/clear`, { method: 'POST' });
  renderSidebar();
  renderChat();
  safeIcons();
  document.getElementById('input').focus();
}

async function switchConv(id) {
  if (isStreaming || id === active) return;
  active = id;
  save();
  const conv = current();
  try {
    await fetch(`${API}/api/switch`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conv.msgs.map(m => ({ role: m.role, content: m.content })) }),
    });
  } catch {}
  renderSidebar();
  renderChat();
  safeIcons();
}

function togglePin(id) {
  const c = convs.find(x => x.id === id);
  if (c) { c.pinned = !c.pinned; save(); renderSidebar(); safeIcons(); }
}

function askDelete(id) {
  const c = convs.find(x => x.id === id);
  if (!c) return;
  showDialog(
    'Delete conversation?',
    `"${c.title}" will be permanently removed.`,
    () => doDelete(id)
  );
}

async function doDelete(id) {
  convs = convs.filter(c => c.id !== id);
  if (active === id) {
    if (!convs.length) { const c = mkConv(); convs.push(c); active = c.id; }
    else active = convs[0].id;
    await fetch(`${API}/api/clear`, { method: 'POST' });
  }
  save();
  renderSidebar();
  renderChat();
  safeIcons();
}

// ══════════════════════════════════
// CHAT RENDER
// ══════════════════════════════════
function renderChat() {
  const conv = current();
  const box  = document.getElementById('messages');
  document.getElementById('topbarName').textContent = conv?.title || 'Stock Agent';

  if (!conv || !conv.msgs.length) {
    box.innerHTML = '';
    box.appendChild(emptyState());
    return;
  }

  box.innerHTML = '';
  conv.msgs.forEach(m => box.appendChild(msgEl(m.role, m.content, m.ts)));
  scrollBottom();
}

function emptyState() {
  const d = el('div', 'empty-state');
  d.innerHTML = `
    <div class="empty-grad">
      <i data-lucide="bar-chart-2" style="width:22px;height:22px"></i>
    </div>
    <div class="empty-title">What would you like to research?</div>
    <div class="empty-sub">Ask about stocks, financials, analyst ratings, news, or get a full research report.</div>
    <div class="chips">
      <button class="chip-btn" onclick="send('Analyse NVDA and generate a full report')">Full NVDA analysis</button>
      <button class="chip-btn" onclick="send('What is AAPL trading at right now?')">AAPL price</button>
      <button class="chip-btn" onclick="send('Compare TSLA and RIVN valuations')">TSLA vs RIVN</button>
      <button class="chip-btn" onclick="send('What earnings are coming up this week?')">Upcoming earnings</button>
    </div>`;
  return d;
}

function msgEl(role, content, ts) {
  const row = el('div', 'msg-row');
  if (role === 'user') {
    row.innerHTML = `
      <div class="msg-user-wrap">
        <div>
          <div class="msg-user-bubble">${escHtml(content)}</div>
          ${ts ? `<div class="msg-time">${fmtTime(ts)}</div>` : ''}
        </div>
      </div>`;
  } else {
    const body = el('div', 'msg-body');
    const md = el('div', 'md-content');
    md.innerHTML = renderMd(content);
    addCopyBtns(md);
    md.querySelectorAll('pre code').forEach(e => hljs.highlightElement(e));
    body.appendChild(md);
    row.innerHTML = `
      <div class="msg-ai-head">
        <div class="ai-avatar"><i data-lucide="trending-up" style="width:13px;height:13px"></i></div>
        <span class="ai-name">Stock Agent</span>
        ${ts ? `<span class="ai-time">${fmtTime(ts)}</span>` : ''}
      </div>`;
    row.appendChild(body);
  }
  return row;
}

function addCopyBtns(container) {
  container.querySelectorAll('pre').forEach(pre => {
    const wrap = el('div', 'code-block');
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(pre);
    const btn = el('button', 'copy-btn');
    btn.innerHTML = `<i data-lucide="copy" style="width:11px;height:11px"></i> Copy`;
    btn.onclick = () => {
      navigator.clipboard.writeText(pre.innerText).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = `<i data-lucide="check" style="width:11px;height:11px"></i> Copied`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<i data-lucide="copy" style="width:11px;height:11px"></i> Copy`;
          safeIcons();
        }, 1800);
        safeIcons();
      });
    };
    wrap.appendChild(btn);
  });
}

function renderMd(text) {
  return DOMPurify.sanitize(marked.parse(text || ''));
}

function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

// ══════════════════════════════════
// SEND  (critical: use DOM refs, NOT getElementById)
// ══════════════════════════════════
function sendFromInput() {
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (text) { inp.value = ''; autoResize(inp); send(text); }
}

function stopGeneration() {
  if (abortCtrl) abortCtrl.abort();
}

async function send(text) {
  if (!text || isStreaming) return;
  isStreaming = true;
  abortCtrl   = new AbortController();
  setSend(false);
  setStop(true);

  document.querySelector('.empty-state')?.remove();

  const conv = current();
  const now  = Date.now();

  // Store + render user message
  conv.msgs.push({ role: 'user', content: text, ts: now });
  if (conv.title === 'New conversation') {
    conv.title = text.slice(0, 50) + (text.length > 50 ? '…' : '');
    renderSidebar();
    safeIcons();
    document.getElementById('topbarName').textContent = conv.title;
  }
  save();

  const msgBox = document.getElementById('messages');
  msgBox.appendChild(msgEl('user', text, now));
  scrollBottom();

  // Build AI row — local DOM refs, never getElementById
  const aiRow      = el('div', 'msg-row msg-ai');
  const aiHead     = el('div', 'msg-ai-head');
  aiHead.innerHTML = `
    <div class="ai-avatar"><i data-lucide="trending-up" style="width:13px;height:13px"></i></div>
    <span class="ai-name">Stock Agent</span>`;

  const progressWrap = el('div', 'tool-progress-wrap');
  const aiBody       = el('div', 'msg-body');
  const mdContent    = el('div', 'md-content');
  aiBody.appendChild(mdContent);

  aiRow.appendChild(aiHead);
  aiRow.appendChild(progressWrap);
  aiRow.appendChild(aiBody);
  msgBox.appendChild(aiRow);
  safeIcons();
  scrollBottom();

  const toolRows = {};
  let fullText   = '';
  let firstChunk = true;
  let stopped    = false;

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
      signal: abortCtrl.signal,
    });

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6);
        if (raw === '[DONE]') break;

        try {
          const evt = JSON.parse(raw);

          // ── Tool started ──
          if (evt.type === 'tool_start') {
            const row = el('div', 'tool-row running');
            row.innerHTML = `
              <div class="tool-spinner-wrap"><div class="t-spinner"></div></div>
              <span>${escHtml(evt.label)}${evt.query ? ' — <em>' + escHtml(evt.query.slice(0,45)) + '</em>' : ''}</span>`;
            progressWrap.appendChild(row);
            toolRows[evt.tool] = row;
            scrollBottom();
          }

          // ── Tool finished ──
          if (evt.type === 'tool_end') {
            const row = toolRows[evt.tool];
            if (row) {
              row.classList.remove('running');
              row.classList.add('done');
              row.querySelector('.tool-spinner-wrap').innerHTML =
                `<i data-lucide="check" class="t-check" style="width:13px;height:13px"></i>`;
              safeIcons();
            }
          }

          // ── Token chunk ──
          if (evt.type === 'chunk') {
            if (firstChunk) {
              firstChunk = false;
              setTimeout(() => {
                progressWrap.style.transition = 'opacity 0.4s';
                progressWrap.style.opacity = '0';
                setTimeout(() => { progressWrap.style.display = 'none'; }, 400);
              }, 600);
            }
            fullText += evt.content;
            mdContent.innerHTML = renderMd(fullText);
            mdContent.querySelectorAll('pre code').forEach(e => hljs.highlightElement(e));
            const cur = document.createElement('span');
            cur.className = 'cursor';
            mdContent.appendChild(cur);
            scrollBottom();
          }

          // ── Error ──
          if (evt.type === 'error') {
            progressWrap.style.display = 'none';
            mdContent.innerHTML = `<span style="color:var(--red)">${escHtml(evt.content)}</span>`;
          }

        } catch {}
      }
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      stopped = true;
      if (fullText) mdContent.innerHTML = renderMd(fullText) + '<span style="color:var(--muted);font-size:12px"> *(stopped)*</span>';
      else mdContent.innerHTML = `<span style="color:var(--muted);font-size:12px">Generation stopped.</span>`;
    } else {
      mdContent.innerHTML = `<span style="color:var(--red)">Connection error: ${escHtml(e.message)}</span>`;
    }
  } finally {
    // Always runs — prevents isStreaming getting stuck
    mdContent.querySelector('.cursor')?.remove();
    progressWrap.style.display = 'none';
    addCopyBtns(mdContent);
    mdContent.querySelectorAll('pre code').forEach(e => hljs.highlightElement(e));
    safeIcons();

    if (fullText) {
      conv.msgs.push({ role: 'assistant', content: fullText, ts: Date.now() });
      save();
    }

    abortCtrl   = null;
    isStreaming  = false;
    setSend(true);
    setStop(false);
    renderSidebar();
    safeIcons();
    document.getElementById('input').focus();
    scrollBottom();
  }
}

// ══════════════════════════════════
// HELPERS
// ══════════════════════════════════
function setSend(on) { document.getElementById('sendBtn').disabled = !on; }
function setStop(on) {
  const b = document.getElementById('stopBtn');
  if (on) b.classList.add('visible'); else b.classList.remove('visible');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFromInput(); }
}

// ══════════════════════════════════
// DIALOG
// ══════════════════════════════════
function showDialog(title, msg, cb) {
  document.getElementById('dlgTitle').textContent = title;
  document.getElementById('dlgMsg').textContent   = msg;
  document.getElementById('dlgConfirm').onclick   = () => { closeDialog(); cb(); };
  document.getElementById('dialogOverlay').style.display = 'flex';
}

function closeDialog() {
  document.getElementById('dialogOverlay').style.display = 'none';
}

document.getElementById('dialogOverlay').addEventListener('click', e => {
  if (e.target.id === 'dialogOverlay') closeDialog();
});
</script>
